{% extends 'base.html' %}

{% block title %}Cadastrar Estagiário{% endblock %}

{% block content %}
<h2 class="mb-3">Cadastrar Novo Estagiário</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="/estagiarios/" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
