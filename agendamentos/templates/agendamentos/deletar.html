{% extends 'base.html' %}

{% block title %}Excluir Agendamento{% endblock %}

{% block content %}
<h2>Tem certeza que deseja apagar este agendamento?</h2>

<form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger">Excluir</button>
    <a href="{% url 'listar_agendamentos' %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
